steps:

# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/live-agent-web-repo/webapp',
    '.'
  ]

# Push image
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push',
    'us-central1-docker.pkg.dev/$PROJECT_ID/live-agent-web-repo/webapp'
  ]

# Deploy to Cloud Run — Vertex AI IAM auth, no API key needed
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: [
    'run', 'deploy', 'google-gemini-liveagent-hackathon',
    '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/live-agent-web-repo/webapp',
    '--region', 'us-central1',
    '--platform', 'managed',
    '--allow-unauthenticated',
    '--session-affinity',
    '--timeout', '3600',
    '--set-env-vars', 'VERTEX_PROJECT=$PROJECT_ID,VERTEX_LOCATION=us-central1',
  ]
