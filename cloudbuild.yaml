steps:

# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/live-agent-web-repo/webapp',
    '.'
  ]

# Push image
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push',
    'us-central1-docker.pkg.dev/$PROJECT_ID/live-agent-web-repo/webapp'
  ]

# Deploy to Cloud Run with runtime env vars
# USE_VERTEX=true → server.js uses Vertex AI with IAM (ADC), no API key needed
# --session-affinity → required for WebSocket connections
# --timeout 3600    → prevents live sessions being killed after 5 min default
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: [
    'run', 'deploy', 'webapp',
    '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/live-agent-web-repo/webapp',
    '--region', 'us-central1',
    '--platform', 'managed',
    '--allow-unauthenticated',
    '--session-affinity',
    '--timeout', '3600',
    '--set-env-vars', 'USE_VERTEX=true,VERTEX_PROJECT=$PROJECT_ID,VERTEX_LOCATION=us-central1',
  ]
